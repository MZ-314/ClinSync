services:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinsync_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - HAPI_FHIR_URL=http://hapi-fhir:8080/fhir
    depends_on:
      - postgres
      - kafka
      - hapi-fhir
    volumes:
      - ./backend:/app
    networks:
      - clinsync_net
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # The frontend (Vite + React) is deployed to Vercel and run locally with
  # `npm run dev` from the `frontend/` folder (default port 5173).
  # See frontend/README.md for setup. No docker service is needed.

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinsync_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinsync_secret}
      POSTGRES_DB: ${POSTGRES_DB:-clinsync_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinsync_net
    restart: unless-stopped

  # ── Zookeeper (required by Kafka) ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: clinsync_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - clinsync_net
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: clinsync_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - clinsync_net
    restart: unless-stopped

  # ── HAPI FHIR Server ─────────────────────────────────────────────────────────
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: clinsync_hapi_fhir
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.default_encoding: json
      hapi.fhir.allow_external_references: "true"
    networks:
      - clinsync_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  clinsync_net:
    driver: bridge